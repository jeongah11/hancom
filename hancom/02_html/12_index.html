<!-- HTML문서 선언 -->
<!DOCTYPE html>
<!-- 문서 시작, 한국어 페이지 -->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸 -->
    <head>
        <meta charset="UTF-8"> <!-- 한글 안 깨지도록 -->
        <title>번호 목록</title> <!-- 브라우저 탭 이름-->
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>
        <!-- 번호가 자동으로 붙는 목록(순서 중요할 때) -->
        <ol>
            <li>먹는것</li>
            <ul>
                <li>아침</li>
                <li>점심</li>
                <li>저녁</li>
            </ul>
            <li>자는것</li>
            <ol type="a">
                <li>세수하기</li>
                <li>양치하기</li>
            </ol>
            <li>걷는것</li>
        </ol>
        <ol start="5" reversed>
            <li>긴장된다...</li>
            <li>심장이 쿵쾅</li>
            <li>손에 땀이...</li>
            <li>발표 자료 열기</li>
            <li>🚀 발표 시작!</li>
        </ol>
        <ol>
            <li>7월
                <ol type="a">
                <li>포트폴리오 완성</li>
                <li>운동 시작하기</li>
                </ol>
            </li>
            <li>8월
                <ol type="a">
                <li>여름휴가</li>
                <li>새 프로젝트 시작</li>
                </ol>
            </li>
        </ol>
    </body>
</html>
