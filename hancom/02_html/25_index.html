<!-- HTML문서 선언 -->
<!DOCTYPE html>
<!-- 문서 시작, 한국어 페이지 -->
<html lang="ko">
    <!-- 화면에서 보이지 않는 칸 -->
    <head>
        <meta charset="UTF-8">  <!-- 한글 깨지지 않도록 -->
        <title>글자 꾸미기</title> <!-- 브라우저 탭 이름 -->
    </head>
    <!-- 화면에서 보이는 내용 칸 -->
    <body>
        <h1>글자 꾸미기</h1>
        <p><em>기울임 강조</em></p>
        <p><mark>형관펜 입니다.</mark></p>
        <p><small>작게 쓰는 글씨</small></p>
        <blockquote>남의 말을 인용합니다.</blockquote>
        <p>H<sub>2</sub>0</p>
        <p>X<sup>2</sup></p>
    </body>
</html>
