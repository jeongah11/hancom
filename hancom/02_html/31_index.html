<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
        ① meta = 화면엔 안 보이는 '정보 쪽지' 태그 (브라우저한테 주는 메모) -->
       <!-- ② name="viewport" = 이 쪽지는 '보이는 화면 영역' 설정이다 -->
       <!-- ③ width=device-width = 페이지 너비를 기기 화면 너비에 맞춤 (폰이면 폰 너비, PC면 PC 너비) -->
       <!-- ④ initial-scale=1.0 = 처음 확대 배율 1배(원래 크기) -->
       <!-- ★ 모바일 '전용' 아님! 모든 기기 크기에 맞추는 반응형의 출발점. 없으면 폰에서 글자가 깨알같이 작게 나옴
    -->
    <title>Document</title>
</head>
<body>
    <!-- ul>li*N -->
    <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>
    <!-- ul>li{아이템$}*3 -->
    <ul>
        <li>아이템1</li>
        <li>아이템2</li>
        <li>아이템3</li>
    </ul>
    <!-- $ : 숫자 자동 증가 -->
    <!-- .box$$$*3 -->
    <div class="box001"></div>
    <div class="box002"></div>
    <div class="box003"></div>

    <!-- .box -->
    <div class="box"></div>
    <div class="card"></div>

    <!-- #top -->
    <div id="top"></div>
    <div id="bottom"></div>

    <!-- h1{잘가} -->
    <h1>잘가</h1>
    <h1>안녕하세요</h1>
    <!-- 원하는 태그 {넣을 내용} -->

    <!-- a[href=#] 속성 넣기 -->
    <a href="#"></a>
</body>
</html>

<!-- 
1. > : 안에 넣기(자식) ul>li : ul안에 li
2. *N : N번 반복 li*3 = li 3개
3. .이름 : class 붙이기
4. #이름 : id 붙이기
5. {글자} : 태그 안의 내용
6. [속성] : 속성 넣기
-->
