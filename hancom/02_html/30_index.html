<!-- HTML문서 선언 -->
<!DOCTYPE html>
<!-- 문서 시작, 한국어 페이지 -->
<html lang="ko">
    <!-- 화면에 안보이는 칸 -->
    <head>
        <meta charset="UTF-8">  <!-- 한글 안깨지게 -->
        <title>음성 넣기</title> <!-- 브라우저 탭 이름 -->
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>
        <h1>음성 파일</h1>
        <audio controls autoplay loop>
            <source src="audio.mp4" type="audio/mpeg"> <!-- mp3 후보 -->
            <source src="audio.ogg" type="audio/ogg"> <!-- ogg 후보(둘 중 가능한 것 재생) -->

            내 브라우저는 audio 미지원 <!-- 둘 다 안되면 보일 글 -->
        </audio>
    </body>
</html>
