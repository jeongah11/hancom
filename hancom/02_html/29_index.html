<!-- HTML문서 선언 -->
<!DOCTYPE html>
<!-- 문서 시작, 한국어 페이지 -->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸 -->
    <head>
        <meta charset="UTF-8">  <!-- 한글 깨지지 않게 -->
        <title>영상 넣기</title> <!-- 브라우저 탭 이름 -->
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>
        <h1>영상 넣기</h1>
        <video src="video.mp4" width="400" controls autoplay muted></video>
    </body>
</html>
<!-- 
대부분의 최신 브라우저(Chrome, Safari 등)는 사용자 상호작용 없이 소리가 나는 자동재생을 차단합니다. 자동재생을 시키려면 반드시 muted 속성을 함께 써야 합니다.
-->
