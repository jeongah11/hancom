<!DOCTYPE html>     <!-- "이건 HTML 문서야" 라고 알려주기-->
<html lang="ko">    <!-- 문서 시작, 안국어 페이지 -->
    <head>          <!-- 화면엔 안 보이는 준비 칸 -->
        <meta charset="UTF-8"> <!-- 화면 안 깨지게 -->
        <title>안녕하세요</title><!-- 브라우저 탭에 뜨는 이름 -->
    </head>
    <body>          <!-- 화면에 보이는 진짜 내용 칸 -->
        <h1>
            안녕하세요~~
        </h1>
    </body>
</html>
<!-- 
 - 요소(element) : 여는 태그 + 내용 + 닫는 태그 
 - 태그 이름은 대소문자 안 가림 (H1 = h1)
-->
