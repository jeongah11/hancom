<!-- HTML문서 선언 -->
<!DOCTYPE html>
<!-- 문서 시작, 한국어 페이지 -->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸 -->
    <head>
        <meta charset="UTF-8"> <!-- 한글 깨지지 않도록 -->
        <title>폼 그리고 입력</title> <!-- 브라우저 탭 이름 -->
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>
        <!-- 입력 칸들을 담는 묶는 상자 -->
        <form>
            <!-- label : 설명 글자, input : 글자 칸 -->
            <label>이름: <input type="text" placeholder="이름 입력"></label>
            <br>
            <hr>
            <label>목표: <input type="number" placeholder="HTML 목표치 1~10"></label>
            <br>
            <hr>
            <label>이메일: <input type="email" placeholder="abc@abc.com"></label>
            <br>
            <hr>
            <label>생일 <input type="date" placeholder="1999-01-01"></label>
            <br>
            <hr>
            <button type="submit">
                보내기
            </button>
        </form>
        <form>
            <label>
                전화번호:
                <input 
                type="tel" 
                pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" 
                placeholder="010-1234-5678"
                required
                />
            </label>
            <input type="submit" value="확인" />
        </form>
    </body>
</html>
