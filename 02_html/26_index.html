<!-- HTML문서 선언 -->
<!DOCTYPE html>
<!-- 문서 시작, 한국어 페이지 -->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸 -->
    <head>
        <meta charset="UTF-8">  <!-- 한글 깨지지 않도록 -->
        <title>표 합치기</title> <!-- 브라우저 탭 이름 -->
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>
        <h1>표 합치기</h1>
        <table border="1">
            <thead>
                <tr>
                    <th colspan="3"> <!-- 가로 3칸을 하나로 합침 -->
                        성적표
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr><td rowspan="4">과목</td><td>영어</td><td>90</td></tr>
                <tr><td>수학</td><td>85</td></tr>
                <tr><td>국어</td><td>95</td></tr>
                <tr><td>공학</td><td>100</td></tr>
            </tbody>
            <tfoot>
                <tr><th colspan="2">평균</th><td>92.5</td></tr>
            </tfoot>
        </table>
    </body>
</html>
