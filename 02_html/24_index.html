<!-- HTML문서 선언 -->
<!DOCTYPE html>
<!-- 문서 시작, 한글 페이지 -->
<html lang="ko">
    <!-- 화면에 보이지 않는 칸 -->
    <head>
        <meta charset="UTF-8">  <!-- 한글 깨지지 않도록 -->
        <title>입력 Type</title> <!-- 브라우저 탭 이름 -->
    </head>
    <!-- 화면에 보이는 내용 칸 -->
    <body>
        <h1>입력 Type</h1>
        <form>
            <label>이메일 : <input type="email" placeholder="메일"></label>
            <br>
            <label>비밀번호 : <input type="password"></label>
            <br>
            <label>동의 <input type="checkbox"></label>
            <br>
            <label>성별 <input type="radio" name="gender">남</label>
            <label><input type="radio" name="gender">여</label>
            <br>
            <input type="date">
            <br>
            <textarea>
                안녕하세요!
            </textarea>
            <br>
            <select>
                <option>서울</option>
                <option>부산</option>
                <option>제주도</option>
            </select>
        </form>
    </body>
</html>
